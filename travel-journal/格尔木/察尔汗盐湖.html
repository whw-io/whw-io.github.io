<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>拾光·放映室 | 视频播放</title>
    <link href="https://fonts.googleapis.cn/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/5.15.4/css/all.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
            background: radial-gradient(circle at 10% 20%, #0B1120, #0A0F1A, #03050B);
            background-attachment: fixed;
            min-height: 100vh;
            color: #EFF3FC;
            line-height: 1.5;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIzMDAiIGhlaWdodD0iMzAwIj48ZmlsdGVyIGlkPSJmIj48ZmVUdXJidWxlbmNlIHR5cGU9ImZyYWN0YWxOb2lzZSIgYmFzZUZyZXF1ZW5jeT0iLjY1IiBudW1PY3RhdmVzPSIzIiAvPjwvZmlsdGVyPjxyZWN0IHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiIGZpbHRlcj0idXJsKCNmKSIgb3BhY2l0eT0iMC4wMyIgLz48L3N2Zz4=');
            background-repeat: repeat;
            pointer-events: none;
            opacity: 0.35;
            z-index: 0;
        }

        body::after {
            content: "";
            position: fixed;
            width: 80vw;
            height: 80vw;
            background: radial-gradient(circle, rgba(79, 125, 193, 0.15) 0%, rgba(0,0,0,0) 70%);
            top: -20vh;
            right: -20vw;
            border-radius: 50%;
            pointer-events: none;
            filter: blur(60px);
            z-index: 0;
            animation: floatGlow 18s infinite alternate ease-in-out;
        }

        @keyframes floatGlow {
            0% { transform: translate(0, 0) scale(1); opacity: 0.4; }
            100% { transform: translate(30px, 40px) scale(1.2); opacity: 0.7; }
        }

        .wrapper {
            position: relative;
            z-index: 2;
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 2rem 3rem;
        }

        /* 返回导航栏 */
        .back-nav {
            margin-bottom: 2rem;
        }
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(18, 25, 45, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 60px;
            padding: 0.6rem 1.4rem;
            font-size: 0.9rem;
            font-weight: 500;
            color: #B9D0FF;
            border: 1px solid rgba(72, 110, 180, 0.4);
            transition: all 0.2s ease;
            text-decoration: none;
        }
        .back-btn i {
            font-size: 0.9rem;
            transition: transform 0.2s;
        }
        .back-btn:hover {
            background: rgba(30, 45, 75, 0.85);
            border-color: #6C8EFF;
            color: white;
            gap: 0.7rem;
        }
        .back-btn:hover i {
            transform: translateX(-3px);
        }

        /* 视频容器 */
        .video-container {
            background: rgba(18, 25, 45, 0.55);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            padding: 1.5rem;
            border: 1px solid rgba(72, 110, 180, 0.35);
            box-shadow: 0 25px 40px -18px rgba(0, 0, 0, 0.5);
            margin-bottom: 2rem;
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%; /* 16:9 宽高比 */
            height: 0;
            overflow: hidden;
            border-radius: 1.2rem;
            background: #000;
        }
        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        /* 标题和描述区 */
        .video-info {
            margin-top: 1.8rem;
            text-align: center;
        }
        .video-info h2 {
            font-size: 1.8rem;
            font-weight: 600;
            background: linear-gradient(135deg, #FFFFFF, #9BB9FF);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
        }
        .video-info p {
            color: #B4CAF0;
            font-size: 1rem;
            opacity: 0.85;
        }
        .accent-line {
            width: 70px;
            height: 3px;
            background: linear-gradient(90deg, #3B82F6, #A855F7);
            margin: 1rem auto 0;
            border-radius: 4px;
        }

        /* 额外推荐区（可选，提升质感） */
        .suggest {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.85rem;
            color: #7A8FB0;
        }
        .suggest i {
            margin-right: 0.4rem;
        }

        @media (max-width: 780px) {
            .wrapper {
                padding: 1.2rem;
            }
            .video-container {
                padding: 1rem;
            }
            .video-info h2 {
                font-size: 1.4rem;
            }
            .back-btn {
                padding: 0.5rem 1.2rem;
                font-size: 0.8rem;
            }
        }

        @media (max-width: 480px) {
            .video-info h2 {
                font-size: 1.2rem;
            }
        }

        /* 入场动效 */
        .fade-up {
            animation: fadeSlideUp 0.6s ease forwards;
        }
        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="wrapper fade-up">
        <!-- 返回首页按钮 -->
        <div class="back-nav">
            <a href="javascript:void(0);" class="back-btn" id="backToHomeBtn">
                <i class="fas fa-arrow-left"></i> 返回上一级
            </a>
        </div>

        <!-- 视频播放区域 -->
        <div class="video-container">
            <div class="video-wrapper">
                <iframe 
                    src="https://player.bilibili.com/player.html?bvid=BV1uYLJ6jEoj&page=1&high_quality=1" 
                    frameborder="0" 
                    allowfullscreen>
                </iframe>
            </div>
            <div class="video-info">
                <h2>📺 正在放映 | 格尔木@察尔汗盐湖</h2>
                <p>2026.05.03</p>
                <div class="accent-line"></div>
            </div>
        </div>
        <div class="suggest">
            <i class="fas fa-compact-disc"></i> 享受生活 · 记录回忆
        </div>
    </div>

    <script>
        // 返回首页的链接：开发环境下可根据实际路径调整，默认为 index.html 或当前目录的首页文件
        const backBtn = document.getElementById('backToHomeBtn');
        if (backBtn) {
            backBtn.addEventListener('click', (e) => {
                e.preventDefault();
                // 尝试跳转到上一页面的根目录下的 index.html（与视频页同级）
                // 更稳健的做法: 如果首页文件名为 index.html 且在同一目录下，直接跳转
                // 若需要适配用户实际环境，可修改为 '/' 或 './index.html'
                window.location.href = '../index.html';
            });
        }
        // 辅助说明：若实际使用中首页并非 index.html，可自行修改 href 为目标地址
        console.log("视频播放页已加载，可通过返回按钮回到导航首页");
    </script>
</body>
</html>
