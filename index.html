<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="referrer" content="never">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>拾光 | 王鸿伟 的个人空间</title>
    <!-- 引入 Google Fonts 提升现代感 -->
    <link href="https://fonts.googleapis.cn/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 (免费图标库) 增强视觉质感 -->
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/5.15.4/css/all.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
            background: radial-gradient(circle at 10% 20%, #0B1120, #0A0F1A, #03050B);
            background-attachment: fixed;
            min-height: 100vh;
            color: #EFF3FC;
            line-height: 1.5;
            position: relative;
            overflow-x: hidden;
        }

        /* 细腻噪点纹理，增加质感 */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIzMDAiIGhlaWdodD0iMzAwIj48ZmlsdGVyIGlkPSJmIj48ZmVUdXJidWxlbmNlIHR5cGU9ImZyYWN0YWxOb2lzZSIgYmFzZUZyZXF1ZW5jeT0iLjY1IiBudW1PY3RhdmVzPSIzIiAvPjwvZmlsdGVyPjxyZWN0IHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiIGZpbHRlcj0idXJsKCNmKSIgb3BhY2l0eT0iMC4wMyIgLz48L3N2Zz4=');
            background-repeat: repeat;
            pointer-events: none;
            opacity: 0.35;
            z-index: 0;
        }

        /* 装饰动态光晕 (柔和流动) */
        body::after {
            content: "";
            position: fixed;
            width: 80vw;
            height: 80vw;
            background: radial-gradient(circle, rgba(79, 125, 193, 0.15) 0%, rgba(0,0,0,0) 70%);
            top: -20vh;
            right: -20vw;
            border-radius: 50%;
            pointer-events: none;
            filter: blur(60px);
            z-index: 0;
            animation: floatGlow 18s infinite alternate ease-in-out;
        }

        @keyframes floatGlow {
            0% {
                transform: translate(0, 0) scale(1);
                opacity: 0.4;
            }
            100% {
                transform: translate(30px, 40px) scale(1.2);
                opacity: 0.7;
            }
        }

        /* 主容器 - 相对层级 */
        .wrapper {
            position: relative;
            z-index: 2;
            max-width: 1360px;
            margin: 0 auto;
            padding: 2rem 2rem 3rem;
        }

        /* 头部区域 —— 圆形头像框替换原有的“数字空间”徽章 */
        .hero {
            text-align: center;
            margin-bottom: 4rem;
            animation: fadeSlideUp 0.7s cubic-bezier(0.2, 0.9, 0.4, 1.1) forwards;
        }

        /* 圆形头像框容器 */
        .avatar-wrapper {
            display: flex;
            justify-content: center;
            margin-bottom: 1.5rem;
        }
        .avatar {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 12px 28px -8px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(99, 143, 255, 0.3);
            transition: transform 0.25s ease, box-shadow 0.3s ease;
            background: #1E2A3A; /* 图片加载前的背景色 */
        }
        .avatar:hover {
            transform: scale(1.02);
            box-shadow: 0 18px 32px -10px rgba(0, 0, 0, 0.6), 0 0 0 2px rgba(99, 143, 255, 0.5);
        }

        .hero h1 {
            font-size: 3.3rem;
            font-weight: 700;
            background: linear-gradient(135deg, #FFFFFF, #9BB9FF, #C0D4FF);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.02em;
            margin-bottom: 0.75rem;
        }

        .hero-desc {
            font-size: 1.2rem;
            color: #B4CAF0;
            max-width: 600px;
            margin: 0 auto;
            font-weight: 400;
            opacity: 0.85;
        }

        /* 分割装饰线 */
        .accent-line {
            width: 70px;
            height: 3px;
            background: linear-gradient(90deg, #3B82F6, #A855F7);
            margin: 1.2rem auto 0;
            border-radius: 4px;
        }

        /* 网格布局 —— 响应式质感卡片区，自动适配手机屏幕 */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            margin: 2.5rem 0 3rem;
        }

        /* 卡片设计：玻璃质感 + 微光边框 + 悬停上升效果 */
        .card {
            background: rgba(18, 25, 45, 0.65);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            padding: 2rem 1.8rem 1.8rem;
            border: 1px solid rgba(72, 110, 180, 0.25);
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            cursor: pointer;
            box-shadow: 0 20px 35px -15px rgba(0, 0, 0, 0.4);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        /* 细腻的内层光晕 */
        .card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at top left, rgba(255, 255, 255, 0.05), transparent 70%);
            pointer-events: none;
            border-radius: inherit;
        }

        /* 悬停动感 */
        .card:hover {
            transform: translateY(-8px);
            border-color: rgba(99, 143, 255, 0.6);
            background: rgba(22, 34, 58, 0.75);
            box-shadow: 0 30px 45px -15px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(99, 143, 255, 0.2);
        }

        .card:active {
            transform: translateY(-3px);
            transition: 0.08s linear;
        }

        /* 图标区域 */
        .card-icon {
            font-size: 3rem;
            margin-bottom: 1.5rem;
            background: linear-gradient(145deg, #D9E6FF, #ADC4FF);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            display: inline-block;
            width: fit-content;
            transition: transform 0.3s ease;
        }

        .card:hover .card-icon {
            transform: scale(1.05);
        }

        .card h3 {
            font-size: 1.8rem;
            font-weight: 600;
            letter-spacing: -0.3px;
            margin-bottom: 0.75rem;
            color: #F1F5FF;
        }

        .card-description {
            font-size: 0.95rem;
            color: #B9D0F0;
            line-height: 1.45;
            margin-bottom: 1.8rem;
            flex: 1;
        }

        /* 优雅的装饰箭头 + 提示 */
        .card-link-hint {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 0.3px;
            color: #94A9FF;
            transition: gap 0.2s ease, color 0.2s;
            background: rgba(255, 255, 255, 0.02);
            width: fit-content;
            padding: 0.25rem 0;
            border-radius: 24px;
        }

        .card-link-hint i {
            font-size: 0.75rem;
            transition: transform 0.2s;
        }

        .card:hover .card-link-hint {
            gap: 0.7rem;
            color: #C0D6FF;
        }

        .card:hover .card-link-hint i {
            transform: translateX(4px);
        }

        /* 页脚设计 */
        .footer {
            text-align: center;
            padding-top: 2.5rem;
            margin-top: 1rem;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            font-size: 0.85rem;
            color: #7A8FB0;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
        }

        .footer-links {
            display: flex;
            gap: 1.5rem;
        }

        .footer-links span {
            transition: color 0.2s;
            cursor: default;
        }

        .footer-links span i {
            margin-right: 0.3rem;
            font-size: 0.8rem;
        }

        .footer-links span:hover {
            color: #B9D0FF;
        }

        /* 自定义提示 (Toast) 优雅淡入淡出 */
        .toast-notify {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: rgba(12, 18, 28, 0.9);
            backdrop-filter: blur(16px);
            border-radius: 60px;
            padding: 0.8rem 1.8rem;
            color: #EFF3FC;
            font-size: 0.9rem;
            font-weight: 500;
            border: 1px solid rgba(82, 128, 255, 0.5);
            box-shadow: 0 10px 20px -5px rgba(0, 0, 0, 0.3);
            z-index: 1000;
            letter-spacing: 0.3px;
            display: flex;
            align-items: center;
            gap: 10px;
            opacity: 0;
            transition: opacity 0.2s ease, transform 0.25s ease;
            pointer-events: none;
            white-space: nowrap;
            font-family: 'Inter', monospace;
        }

        .toast-notify i {
            font-size: 1rem;
            color: #6C8EFF;
        }

        .toast-notify.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* 响应式布局强化 —— 完美适配手机端 */
        @media (max-width: 780px) {
            .wrapper {
                padding: 1.5rem;
            }
            .hero h1 {
                font-size: 2.4rem;
            }
            .hero-desc {
                font-size: 1rem;
                padding: 0 0.5rem;
            }
            .cards-grid {
                gap: 1.5rem;
            }
            .card {
                padding: 1.6rem 1.4rem 1.4rem;
            }
            .card h3 {
                font-size: 1.6rem;
            }
            .avatar {
                width: 80px;
                height: 80px;
            }
            .toast-notify {
                white-space: normal;
                max-width: 85vw;
                text-align: center;
                padding: 0.6rem 1.2rem;
                font-size: 0.8rem;
            }
            .footer {
                flex-direction: column;
                gap: 0.6rem;
            }
        }

        @media (max-width: 480px) {
            .hero h1 {
                font-size: 2rem;
            }
            .avatar {
                width: 70px;
                height: 70px;
            }
            .card-icon {
                font-size: 2.5rem;
            }
            .card-description {
                font-size: 0.88rem;
            }
        }

        /* 入场动画 */
        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .cards-grid .card {
            animation: fadeSlideUp 0.6s cubic-bezier(0.15, 0.9, 0.25, 1) backwards;
        }
        /* 调整动画延迟使顺序视觉舒服，依旧按照文档流顺序依次出现 */
        .cards-grid .card:nth-child(1) { animation-delay: 0.05s; }
        .cards-grid .card:nth-child(2) { animation-delay: 0.15s; }
        .cards-grid .card:nth-child(3) { animation-delay: 0.25s; }
        .cards-grid .card:nth-child(4) { animation-delay: 0.35s; }
    </style>
</head>
<body>
    <div class="wrapper">
        <!-- 头部区域：圆形头像框替换原先的“数字空间”徽章 -->
        <div class="hero">
            <!-- 圆形头像框 (请将 src 替换为真实图片地址) -->
            <div class="avatar-wrapper">
                <img class="avatar" src="http://photogzmaz.photo.store.qq.com/psc?/V51reqF9314cf049MCH11BDYoX07c0wb/TmEUgtj9EK6.7V8ajmQrEGnK0JxWz9Pu*zrMljRin6..4D6Xq.cB7ovo8153MFLzU4yjgDhTPifH.T1XEir3Abh6PglDHYos0MIWDKlWrA4!/b&bo=cAFiAXABYgEDByI!&rf=viewer_4&t=5" alt="个人头像" 
                     onerror="this.onerror=null; this.src='data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 100 100\'%3E%3Crect width=\'100\' height=\'100\' fill=\'%2334495e\'/%3E%3Ctext x=\'50\' y=\'68\' text-anchor=\'middle\' fill=\'%23ffffff\' font-size=\'60\' font-family=\'Arial\'%3E%E7%8E%8B%3C/text%3E%3C/svg%3E';">
            </div>
            <h1>王鸿伟的个人空间</h1>
            <div class="hero-desc">
                探索 · 思考 · 记录 · 沉淀
            </div>
            <div class="accent-line"></div>
        </div>

        <!-- 四大导航板块网格 —— 个人简介置于首位 -->
        <div class="cards-grid">
            <!-- 卡片 1：个人简介 -->
            <div class="card" data-section="about" data-name="个人简介">
                <div class="card-icon">
                    <i class="fas fa-user-astronaut"></i>
                </div>
                <h3>个人简介</h3>
                <div class="card-description">
                    关于我，成长历程，热爱与创造。<br>
                    保持好奇，持续发光。
                </div>
                <div class="card-link-hint">
                    <span>了解故事</span> <i class="fas fa-arrow-right"></i>
                </div>
            </div>

            <!-- 卡片 2：技术博客 -->
            <div class="card" data-section="tech" data-name="技术博客">
                <div class="card-icon">
                    <i class="fas fa-laptop-code"></i>
                </div>
                <h3>技术博客</h3>
                <div class="card-description">
                    架构设计、前沿趋势、源码洞见。<br>
                    记录思考，连接技术的星辰大海。
                </div>
                <div class="card-link-hint">
                    <span>探索笔记</span> <i class="fas fa-arrow-right"></i>
                </div>
            </div>

            <!-- 卡片 3：个人日记 -->
            <div class="card" data-section="diary" data-name="个人日记">
                <div class="card-icon">
                    <i class="fas fa-pen-fancy"></i>
                </div>
                <h3>个人日记</h3>
                <div class="card-description">
                    内心独白，灵感随笔，日常哲思。<br>
                    每一个平凡日子都值得被珍藏。
                </div>
                <div class="card-link-hint">
                    <span>翻阅絮语</span> <i class="fas fa-arrow-right"></i>
                </div>
            </div>

            <!-- 卡片 4：旅游记录 -->
            <div class="card" data-section="travel" data-name="旅游记录">
                <div class="card-icon">
                    <i class="fas fa-map-marked-alt"></i>
                </div>
                <h3>旅游记录</h3>
                <div class="card-description">
                    山川湖海，城市巷陌，异域奇遇。<br>
                    用足迹丈量世界的温度与色彩。
                </div>
                <div class="card-link-hint">
                    <span>启程远方</span> <i class="fas fa-arrow-right"></i>
                </div>
            </div>
        </div>

        <!-- 底部氛围信息，展示美观和版权 -->
        <div class="footer">
            <div>© 2026 拾光 · 王鸿伟的个人空间</div>
            <div class="footer-links">
                <span><i class="far fa-compass"></i> 探索无界</span>
                <span><i class="far fa-heart"></i> 记录浮光</span>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // 卡片映射: 优雅的导航反馈 (占位演示模式，将来可直接替换为真实链接)
            const sectionMap = {
                about: { displayName: "个人简介" },
                tech: { displayName: "技术博客" },
                diary: { displayName: "个人日记" },
                travel: { displayName: "旅游记录" }
            };

            // 创建toast容器
            let activeToast = null;

            function showMessage(title, sectionKey) {
                const info = sectionMap[sectionKey];
                const displayTitle = info ? info.displayName : title;
                if (activeToast && document.body.contains(activeToast)) {
                    activeToast.classList.remove('show');
                    setTimeout(() => {
                        if (activeToast && activeToast.parentNode) activeToast.parentNode.removeChild(activeToast);
                        activeToast = null;
                    }, 200);
                }

                const toast = document.createElement('div');
                toast.className = 'toast-notify';
                let iconHtml = '<i class="fas fa-hand-peace"></i>';
                if (sectionKey === 'tech') iconHtml = '<i class="fas fa-microchip"></i>';
                else if (sectionKey === 'diary') iconHtml = '<i class="fas fa-feather-alt"></i>';
                else if (sectionKey === 'travel') iconHtml = '<i class="fas fa-globe-americas"></i>';
                else if (sectionKey === 'about') iconHtml = '<i class="fas fa-meteor"></i>';
                
                toast.innerHTML = `${iconHtml} <span>✨ 导航 · ${displayTitle} ✨</span> <span style="font-size:0.75rem; margin-left:6px;">(演示模式 | 未来将通往专属空间)</span>`;
                document.body.appendChild(toast);
                setTimeout(() => {
                    toast.classList.add('show');
                }, 10);
                activeToast = toast;

                setTimeout(() => {
                    if (toast && toast.classList) {
                        toast.classList.remove('show');
                        setTimeout(() => {
                            if (toast.parentNode) toast.parentNode.removeChild(toast);
                            if (activeToast === toast) activeToast = null;
                        }, 220);
                    }
                }, 2800);
            }

            const cards = document.querySelectorAll('.card');
            
            cards.forEach(card => {
                const section = card.getAttribute('data-section');
                const nameAttr = card.getAttribute('data-name');
                
                card.style.cursor = 'pointer';
                
                card.addEventListener('click', (e) => {
                    e.stopPropagation();
                    let targetSection = section;
                    let displayTitle = nameAttr;
                    
                    if (!targetSection) {
                        const heading = card.querySelector('h3');
                        if (heading) {
                            const text = heading.innerText;
                            if (text.includes('个人简介')) targetSection = 'about';
                            else if (text.includes('技术博客')) targetSection = 'tech';
                            else if (text.includes('个人日记')) targetSection = 'diary';
                            else if (text.includes('旅游记录')) targetSection = 'travel';
                            else targetSection = 'general';
                        } else {
                            targetSection = 'general';
                        }
                    }
                    // 真实跳转
                    const realLinks = {
                        about: '/about-me/index.html',
                        tech: '/#',
                        diary: '/#',
                        travel: '/travel-journal/index.html'
                    };
                    if(realLinks[targetSection]) {
                        window.location.href = realLinks[targetSection];
                    } else {
                        showMessage(displayTitle || '板块', targetSection);
                    }
            
                    card.style.transform = 'scale(0.99)';
                    setTimeout(() => {
                        if (card) card.style.transform = '';
                    }, 120);
                });
                
                card.setAttribute('tabindex', '0');
                card.setAttribute('role', 'button');
                card.setAttribute('aria-label', `前往 ${nameAttr || '板块'}`);
                card.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        card.click();
                    }
                });
            });
            
            console.log("%c✨ 拾光导航已启动 | 圆形头像框已替换“数字空间” | 请将头像图片链接替换为真实地址", "color: #6C8EFF; font-size: 12px; font-family: monospace;");
        })();
    </script>
</body>
</html>
